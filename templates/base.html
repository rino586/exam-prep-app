<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}受験対策アプリ{% endblock %}</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="/static/style.css">
</head>
<body class="min-h-screen bg-gradient-to-br from-blue-50 to-green-50">

  <!-- ナビゲーション -->
  <nav class="bg-white shadow-md">
    <div class="max-w-3xl mx-auto px-4 py-3 flex items-center justify-between">
      <a href="/" class="flex items-center gap-2 text-blue-600 font-bold text-xl">
        <span class="text-2xl">📚</span>
        <span>受験対策アプリ</span>
      </a>
      <div class="flex gap-4 items-center">
        <a href="/input" class="nav-link">➕ 問題を入力</a>
        <a href="/history" class="nav-link">📋 履歴</a>
        <a href="/logout" class="nav-link text-gray-400 hover:text-red-500">🔓 ログアウト</a>
      </div>
    </div>
  </nav>

  <!-- メインコンテンツ -->
  <main class="max-w-3xl mx-auto px-4 py-8">
    {% block content %}{% endblock %}
  </main>

  <!-- フッター -->
  <footer class="text-center text-gray-400 text-sm py-6">
    <p>🌟 毎日こつこつ練習しよう！ 🌟</p>
  </footer>

</body>
</html>
