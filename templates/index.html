{% extends "base.html" %}
{% block title %}ホーム - 受験対策アプリ{% endblock %}

{% block content %}
<div class="text-center mb-10">
  <div class="text-6xl mb-4">🎯</div>
  <h1 class="text-3xl font-bold text-gray-800 mb-2">受験対策アプリ</h1>
  <p class="text-gray-500 text-lg">間違えた問題を入力して、類似問題で練習しよう！</p>
</div>

<!-- 統計 -->
<div class="bg-white rounded-2xl shadow-sm p-6 mb-8 text-center">
  <p class="text-gray-500 mb-1">これまでに入力した問題</p>
  <p class="text-5xl font-bold text-blue-600">{{ total }}<span class="text-2xl text-gray-400 ml-1">問</span></p>
</div>

<!-- メインボタン -->
<div class="grid grid-cols-1 gap-4 mb-8">
  <a href="/input" class="card-btn bg-blue-500 hover:bg-blue-600">
    <span class="text-3xl">✏️</span>
    <div>
      <div class="font-bold text-lg">間違えた問題を入力する</div>
      <div class="text-blue-100 text-sm">問題を入力すると類似問題を3問作ります</div>
    </div>
  </a>
  <a href="/history" class="card-btn bg-green-500 hover:bg-green-600">
    <span class="text-3xl">📖</span>
    <div>
      <div class="font-bold text-lg">これまでの問題で練習する</div>
      <div class="text-green-100 text-sm">入力した問題の一覧から選んで練習</div>
    </div>
  </a>
</div>

<!-- 科目バッジ -->
<div class="bg-white rounded-2xl shadow-sm p-5">
  <p class="text-gray-500 text-sm mb-3 font-medium">対応している科目</p>
  <div class="flex gap-3">
    <span class="subject-badge bg-yellow-100 text-yellow-700">🔢 算数</span>
    <span class="subject-badge bg-pink-100 text-pink-700">📝 国語</span>
  </div>
</div>
{% endblock %}
